volumes:
  scenarios:
services:
  factorio_1:
    image: 'factorio:latest'
    volumes:
      - type: bind
        source: ./scenarios/lab_scenario
        target: /opt/factorio/scenarios/lab_scenario
    ports:
      - '34198:34197/udp'
      - '27016:27015/tcp'
    entrypoint: ["sh", "/scenario.sh", "lab_scenario"]
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
  factorio_2:
    image: 'factorio:latest'
    ports:
      - '34199:34197/udp'
      - '27017:27015/tcp'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
  factorio_3:
    image: 'factorio:latest'
    ports:
      - '34200:34197/udp'
      - '27018:27015/tcp'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
  factorio_4:
    image: 'factorio:latest'
    ports:
      - '34201:34197/udp'
      - '27019:27015/tcp'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M