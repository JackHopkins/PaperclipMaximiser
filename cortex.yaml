# cortex.yaml
- name: hello-world
  kind: RealtimeAPI
  pod:
    port: 8080
    containers:
      - name: api #infrastructureascode/hello-world
        image: 216370203482.dkr.ecr.eu-west-2.amazonaws.com/paperclip-client:latest #python:3.8-buster #public.ecr.aws/y5j3i3w6/paperclip_client:latest
        env:
          PYTHONUNBUFFERED: "1"
        compute:
          cpu: 100m
          mem: 512Mi      #readiness_probe: # periodic probe of container readiness; traffic will not be sent into the pod unless all containers' readiness probes are succeeding (optional)
        liveness_probe:
          http_get:
            path: "/healthz"
            port: 8080
        readiness_probe:
          http_get:
            path: "/healthz"
            port: 8080
      - name: factorio-container
        compute:
          cpu: 100m
          mem: 1024Mi
        image: 216370203482.dkr.ecr.eu-west-2.amazonaws.com/factorio:latest
        readiness_probe:
          exec:
            command: [ "sh", "probe.sh", "27015" ]
        liveness_probe:
          exec:
            command: [ "sh", "probe.sh", "34197" ]